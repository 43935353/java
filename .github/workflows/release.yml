name: Manual Build and Release (Spring Boot JDK17)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '自定义版本号 列:（v26.7.12)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1️⃣ 检出源码
      - name: Checkout source
        uses: actions/checkout@v5

      # 2️⃣ 设置 JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 3️⃣ 构建
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # 查看生成文件
      - name: Show build artifacts
        run: ls -lh target

      # 4️⃣ 设置版本号：优先使用手动输入，否则自动生成
      - name: Set version tag
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(date +'%y.%m.%d')" >> $GITHUB_OUTPUT
          fi

      # 5️⃣ 创建 GitHub Release 并上传 jar
      - name: Create GitHub Release
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            target/java-game.jar \
            --title "${{ steps.version.outputs.version }}" \
            --notes "
            🎉 自动构建发布（Spring Boot 3 + JDK 17）

            🏷 构建版本：${{ steps.version.outputs.version }}

            💻 构建环境：
            - Spring Boot 3
            - JDK 17 (Temurin)

            ⚙️ 构建方式：
            mvn clean package -DskipTests
            "
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
